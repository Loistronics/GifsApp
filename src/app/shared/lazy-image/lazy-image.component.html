<div class="d-flex justify-content-center">
    <img (load)="onLoad()" src={{url}} alt={{alt}}  class="card-img-top animate__animated animate__bounce" [ngStyle]="{display: cargandoImagen ? '': 'none'}">
    <!-- load se usa para cuando se termina de cargar la imagen -->

    <img *ngIf="!cargandoImagen" src="assets/loader-ring.svg" height="30" width="30" class="mt-3">
</div>
